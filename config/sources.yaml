# Data sources -- all sourced from prediction-markets project
prediction_markets_root: "/path/to/home/projects/prediction-markets"  # Legacy -- SD now uses local adapters in src/adapters/. This path retained for reference only.

structured_feeds:
  ooni:
    adapter: "ghost_market.ooni"
    refresh: "1h"
    signal: "Iran internet connectivity -- leading indicator for C2 reconstitution"
  bonbast:
    adapter: "ghost_market.bonbast"
    refresh: "1h"
    signal: "Iranian rial black market rate -- economic stress indicator"
  eia:
    adapter: "ghost_market.eia"
    refresh: "24h"
    signal: "US petroleum inventory, imports, exports, SPR -- energy disruption"
  ofac:
    adapter: "ghost_market.ofac"
    refresh: "24h"
    signal: "Sanctions list changes -- policy escalation/de-escalation"
  cloudflare_radar:
    adapter: "ghost_market.cloudflare_radar"
    refresh: "1h"
    signal: "Traffic anomalies -- internet disruption confirmation"
  tedpix:
    adapter: "ghost_market.tedpix"
    refresh: "4h"
    signal: "Tehran stock exchange -- Iranian economic sentiment"
  usaspending:
    adapter: "ghost_market.usaspending"
    refresh: "24h"
    signal: "Federal procurement patterns -- government spending signals"
  agsi:
    adapter: "ghost_market.agsi"
    refresh: "12h"
    signal: "European gas storage inventory levels -- energy security baseline, seasonal vulnerability windows"
  comtrade:
    adapter: "ghost_market.comtrade"
    refresh: "24h"
    signal: "UN bilateral trade flows -- sanctions evasion routing, trade diversion patterns, commodity dependency shifts"
  dolarvzla:
    adapter: "ghost_market.dolarvzla"
    refresh: "1h"
    signal: "Venezuela parallel dollar exchange rate -- economic crisis severity, capital flight pressure, regime stability indicator"
  ecb:
    adapter: "ghost_market.ecb"
    refresh: "6h"
    signal: "ECB statistical data warehouse -- eurozone monetary indicators, exchange rate anchors, financial stress signals"
  eia_grid:
    adapter: "ghost_market.eia_grid"
    refresh: "1h"
    signal: "US electricity grid regional generation/demand -- infrastructure stress indicators, extreme weather impact verification"
  entsog:
    adapter: "ghost_market.entsog"
    refresh: "1h"
    signal: "European natural gas pipeline flows -- supply disruption detection, Russia-Europe energy leverage shifts"
  gdelt:
    adapter: "ghost_market.gdelt"
    refresh: "15m"
    signal: "Global event/news monitoring -- mass protest detection, conflict escalation tracking, cross-border incident alerts"
  oryx:
    adapter: "ghost_market.oryx"
    refresh: "12h"
    signal: "Verified military equipment losses with photographic evidence -- conflict attrition tracking, force capability assessment"
  viirs:
    adapter: "ghost_market.viirs"
    refresh: "24h"
    signal: "NASA satellite fire/thermal anomaly detection -- conflict damage verification, infrastructure destruction confirmation, wildfire impact"

osint_feeds:
  federal_register:
    adapter: "osint.federal_register"
    signal: "Executive orders, rule changes -- policy shifts"
  congress:
    adapter: "osint.congress"
    signal: "Legislative activity, hearings -- political signals"
  fec:
    adapter: "osint.fec"
    signal: "Campaign finance -- political money flows"

quantitative:
  fred:
    adapter: "data_sources.FredAdapter"  # Local: src/adapters/fred.py
    signal: "Economic indicators -- macro context"
  noaa:
    adapter: "data_sources.NoaaAdapter"  # Local: src/adapters/noaa.py
    signal: "Weather data -- for weather-sensitive markets"
  cps_voting:
    adapter: "cps_voting.CpsVotingAdapter"  # Local: src/adapters/cps_voting.py
    refresh: "biennial"  # November of even-numbered years only
    cadence: "cold"
    signal: "CPS Voting Supplement -- voter turnout by citizenship status, registration barriers, demographic breakdown"
    key_metrics:
      - "naturalized_turnout_rate: turnout rate for naturalized citizens (unweighted)"
      - "native_born_turnout_rate: turnout rate for native-born citizens (unweighted)"
      - "turnout_gap: naturalized minus native (negative = naturalized vote less)"
    methods:
      - "citizenship_turnout: aggregated rates by citizenship status per state"
      - "turnout_by_demographics: full microdata with age/race/income breakdown"
      - "registration_barriers: non-registrants + PES3 reason codes (ID/doc barriers)"
      - "historical_comparison: multi-year trend across election cycles"
    auth: "CENSUS_API_KEY (optional -- 500 req/day without key)"
    note: "Biennial -- November even years. PWSSWGT required for population-weighted estimates. PES3=3 = registration requirement barrier (citizenship/ID docs)."
  census:
    adapter: "data_sources.CensusAdapter"  # Local: src/adapters/census.py
    refresh: "annual"
    cadence: "cold"
    signal: "ACS citizenship and nativity demographics -- SAVE Act voter eligibility impact, naturalization rates by geography"
    datasets:
      primary: "2023/acs/acs5"    # 5-year, full geographic coverage
      secondary: "2024/acs/acs1"  # 1-year, 65K+ population geographies only
    methods:
      - citizenship_by_geography  # B05003 -- native/naturalized/non-citizen 18+ by geography + race
      - cvap_by_geography         # B29001 -- citizen voting-age population by age bracket
      - nativity_by_education     # B06009 -- foreign-born by educational attainment
      - nativity_by_poverty       # B06012 -- foreign-born by poverty status
      - nativity_by_income        # B06010 -- foreign-born by income bracket
    auth: "CENSUS_API_KEY env var (optional -- 500 req/day without key)"

elections_historical:
  medsl:
    adapter: "elections.ElectionsAdapter"  # Local: src/adapters/elections.py
    refresh: "cold"
    cadence: "cold"
    signal: "MEDSL historical election results -- county/district turnout for voter ID impact analysis (SAVE Act)"
    methods:
      - house_results: "District-level House returns 1976-2018 (params: year, state)"
      - county_presidential: "County-level presidential returns 2000-2016 (params: year, state)"
      - turnout_by_state: "State-level turnout proxy -- total votes cast by year (params: year)"
      - state_comparison: "Before/after comparison across states+years (params: years, states, office)"
    datasets:
      - url: "https://raw.githubusercontent.com/MEDSL/constituency-returns/master/1976-2018-house.csv"
        coverage: "US House 1976-2018, district-level"
      - url: "https://raw.githubusercontent.com/MEDSL/constituency-returns/master/1976-2018-senate.csv"
        coverage: "US Senate 1976-2018, state-level"
      - url: "https://raw.githubusercontent.com/MEDSL/county-returns/master/countypres_2000-2016.csv"
        coverage: "Presidential county returns 2000-2016"
      - url: "https://raw.githubusercontent.com/MEDSL/2024-elections-official/main/2024-president-state.csv"
        coverage: "Presidential state returns 2024"
      - url: "https://raw.githubusercontent.com/MEDSL/2024-elections-official/main/2024-senate-state.csv"
        coverage: "Senate state returns 2024"
    auth: "None required -- public GitHub data"
    note: "No house-by-district for 2024 yet (MEDSL publishes precinct ZIPs but no consolidated CSV). County presidential only covers 2000-2016 in this dataset."

prediction_markets:
  kalshi:
    cli: "pm search"
    signal: "Market prices as implied probabilities"
  polymarket:
    status: "planned"
    signal: "Cross-platform price comparison"
